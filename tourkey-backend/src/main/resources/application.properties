spring.application.name=tourkey-backend
server.port=8080

# PostgreSQL + PostGIS
spring.datasource.url=jdbc:postgresql://localhost:5432/tourkey
spring.datasource.username=${DB_USER:tourkey}
spring.datasource.password=${DB_PASS:tourkey}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# Virtual Threads (Java 21+)
spring.threads.virtual.enabled=true

# JWT
jwt.secret=${JWT_SECRET:TourKeySuperSecretKey2024ForJwtTokenGenerationMustBeAtLeast256Bits}
jwt.expiration-ms=86400000

# CORS
 cors.allowed-origins=http://localhost:3000
